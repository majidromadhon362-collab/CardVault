name: Release CardVault

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Dependencies
        run: npm ci

      - name: Prepare FFmpeg
        run: |
          choco install ffmpeg -y
          npm run prepare:ffmpeg

      - name: Build Tauri
        run: npm run tauri:build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Generate Updater Manifest
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          $asset = Get-ChildItem "src-tauri/target/release/bundle/nsis/*setup.exe" | Select-Object -First 1
          if (-not $asset) { throw "NSIS installer not found" }
          $signaturePath = "$($asset.FullName).sig"
          if (-not (Test-Path -LiteralPath $signaturePath)) { throw "Updater signature not found: $signaturePath" }
          $signature = (Get-Content -Raw -LiteralPath $signaturePath).Trim()
          $url = "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/$($asset.Name)"
          $manifest = [ordered]@{
            version = $version
            notes = "CardVault $version"
            pub_date = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
            platforms = @{
              "windows-x86_64" = @{
                signature = $signature
                url = $url
              }
            }
          }
          $manifest | ConvertTo-Json -Depth 5 | Set-Content -Encoding UTF8 -LiteralPath "src-tauri/target/release/bundle/latest.json"

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.sig
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/msi/*.sig
            src-tauri/target/release/bundle/**/latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
